<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>步步为营</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  </head>
  <body>
    <main class="app">
      <section class="topbar">
        <div>
          <h1>步步为营</h1>
          <p id="status">玩家 1 的回合</p>
        </div>
        <div class="topActions">
          <button id="bgmToggle" type="button">BGM</button>
          <label class="volumeControl">
            音量
            <input id="bgmVolume" type="range" min="0" max="1" step="0.05" value="0.45" />
          </label>
          <button id="resetGame" type="button">重开</button>
        </div>
      </section>

      <section class="table">
        <aside class="panel">
          <div class="modebar" aria-label="玩法模式">
            <button class="gameMode active" data-game-mode="ai" type="button">人机</button>
            <button class="gameMode" data-game-mode="local" type="button">双人</button>
            <button class="gameMode" data-game-mode="online" type="button">联机</button>
          </div>

          <div class="onlinePanel hidden" id="onlinePanel">
            <div class="onlineControls">
              <input id="roomCode" autocomplete="off" maxlength="12" placeholder="房间号" />
              <button id="hostRoom" type="button">创建</button>
              <button id="joinRoom" type="button">加入</button>
            </div>
            <p id="onlineInfo">创建后把房间号发给朋友；朋友输入房间号点加入。</p>
          </div>

          <div class="player turn" id="p0">
            <span class="token gold"></span>
            <strong>玩家 1</strong>
            <small>墙：10</small>
          </div>
          <div class="player" id="p1">
            <span class="token teal"></span>
            <strong>电脑</strong>
            <small>墙：10</small>
          </div>

          <div class="controls">
            <button class="mode active" data-mode="move" type="button">移动</button>
            <button class="mode" data-mode="h" type="button">横墙</button>
            <button class="mode" data-mode="v" type="button">竖墙</button>
          </div>

          <section class="rules" aria-label="游玩说明">
            <h2>游玩说明</h2>
            <p>目标：先把自己的棋子移动到对面底线。</p>
            <p>移动：选择“移动”，点击高亮格子。相邻有对手时可以跳过；后方被墙挡住时可以斜走。</p>
            <p>放墙：选择“横墙”或“竖墙”，点击棋盘缝隙。每人 10 面墙，放墙不能重叠、交叉，也不能完全封死任一玩家的路。</p>
            <p>模式：人机是你对电脑；双人是同屏轮流玩；联机需要创建房间并把房间号发给朋友。</p>
            <p class="musicNote">BGM：把你有使用权限的音乐文件放到 <code>quoridor-online/assets/bgm.mp3</code>，点击右上角 BGM 播放。</p>
          </section>
        </aside>

        <div class="boardWrap">
          <div id="board" class="board" aria-label="步步为营棋盘"></div>
        </div>
      </section>
    </main>

    <audio id="bgmTrack" src="./assets/bgm.mp3" loop preload="none"></audio>
    <script src="./app.js"></script>
  </body>
</html>
