<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Elemental Survival</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="shell">
    <section class="stage">
      <canvas id="game" width="1280" height="720" aria-label="Elemental Survival game canvas"></canvas>
      <div id="touchControls" class="touch-controls" aria-hidden="true">
        <div id="moveStick" class="move-stick"><span></span></div>
        <button id="pauseTouch" class="pause-touch" type="button">Ⅱ</button>
      </div>
      <div id="levelPanel" class="level-panel hidden">
        <div class="panel-head">
          <span>升级选择</span>
          <small>元素法师</small>
        </div>
        <div id="choices" class="choices"></div>
      </div>
      <div id="startPanel" class="start-panel">
        <h1>Elemental Survival</h1>
        <p>元素法师 · 开放世界无限生存 · 特效增强版</p>
        <button id="startBtn" class="hidden" type="button">开始生存</button>
        <div id="startActions" class="start-actions"></div>
        <div id="classPanel" class="class-panel hidden"></div>
      </div>
    </section>
    <aside class="hud">
      <div>
        <h2>状态</h2>
        <dl id="stats"></dl>
      </div>
      <div>
        <h2>技能</h2>
        <ul id="skills"></ul>
      </div>
      <div>
        <h2>随从</h2>
        <ul id="followers"></ul>
      </div>
      <div>
        <h2>装备 / 神器</h2>
        <ul id="items"></ul>
      </div>
    </aside>
  </main>
  <script src="./game.js"></script>
</body>
</html>
