<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>my little gizmo</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f3ea;
      --ink: #202124;
      --muted: #66635c;
      --panel: #fffdf7;
      --line: #d8d0c0;
      --accent: #c8553d;
      --teal: #2f6f73;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(200, 85, 61, 0.14), transparent 30rem),
        linear-gradient(135deg, #f7f4eb, #e8f1ec);
    }

    main {
      width: min(960px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 56px 0;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2.4rem, 7vw, 5.2rem);
      line-height: 0.94;
      letter-spacing: 0;
    }

    .intro {
      margin: 0 0 34px;
      color: var(--muted);
      font-size: 1.05rem;
    }

    .games {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
    }

    .game {
      display: grid;
      gap: 12px;
      min-height: 180px;
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 253, 247, 0.86);
      color: inherit;
      text-decoration: none;
      box-shadow: 0 18px 50px rgba(48, 40, 25, 0.12);
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
    }

    .game:hover {
      transform: translateY(-3px);
      border-color: var(--teal);
      box-shadow: 0 24px 58px rgba(48, 40, 25, 0.16);
    }

    .badge {
      width: fit-content;
      padding: 6px 9px;
      border-radius: 999px;
      background: #d5ebe6;
      color: #25595e;
      font-size: 0.82rem;
      font-weight: 800;
    }

    .game h2 {
      margin: 0;
      font-size: 1.55rem;
      line-height: 1.1;
    }

    .game p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .play {
      align-self: end;
      color: var(--accent);
      font-weight: 850;
    }
  </style>
</head>
<body>
  <main>
    <h1>我的小游戏</h1>
    <p class="intro">这里是游戏列表。以后做新的游戏，可以继续加新的文件夹和入口。</p>

    <section class="games" aria-label="游戏列表">
      <a class="game" href="./word-grid-rush/">
        <span class="badge">Word Puzzle</span>
        <h2>拼单词游戏</h2>
        <p>10 x 10 字母盘，连相邻字母组成英文单词，5 分钟冲高分。</p>
        <span class="play">开始游戏</span>
      </a>
    </section>
  </main>
</body>
</html>
